<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Programa de Notas</title>
</head>
<body>

    <!-- Encabezado -->
    <header>
        <h1>Programa de Notas</h1>
        <p>Registro académico del curso</p>
    </header>

    <!-- Formulario para agregar alumnos -->
    <main>
        <div class="card" id="seccion-formulario">
            <h2>Agregar Alumno</h2>

            <form id="formulario">
                <label for="nombre">Nombre</label>
                <input class="input" id="nombre" type="text" placeholder="Ej. María González">

                <label for="certamen1">Certamen 1</label>
                <input class="input" id="certamen1" type="number" placeholder="Nota (1 - 100)">

                <label for="certamen2">Certamen 2</label>
                <input class="input" id="certamen2" type="number" placeholder="Nota (1 - 100)">

                <label for="certamen3">Certamen 3</label>
                <input class="input" id="certamen3" type="number" placeholder="Nota (1 - 100)">

                <p id="contador" class="contador">0 / 10 alumnos registrados</p>

                <button class="btn btn-rojo" id="btnAgregar" type="submit">
                    Agregar Alumno
                </button>
            </form>
        </div>

        <!-- Sección de resultados -->
        <div class="card" id="seccion-resultados">
            <h2>Resultados</h2>
            <button class="btn btn-azul" id="btnCalcular" type="button">
                Ver Resultados
            </button>
            <div id="resultados"></div>
        </div>
    </main>

    <script src="js/programa.js"></script>
</body>
</html>
