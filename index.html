<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/programa.js"defer></script>
    <script src="js/resultados.js"defer></script>
    <title>Programa De Notas</title>
</head>
<body>
    <div class="general">
        <div>
            <h1>Bienvenidos al Programa De Notas Para Alumnos</h1>
        </div>
        <form class="content" id="formulario">
            <label for="nombre">Nombre:</label>
            <input class="input" id="nombre" name="nombre" type="text">

            <label for="certamen1">Certamen 1:</label>
            <input class="input" id="certamen1" name="certamen1" type="number">

            <label for="certamen2">Certamen 2:</label>
            <input class="input" id="certamen2" name="certamen2" type="number">

            <label for="certamen3">Certamen 3:</label>
            <input class="input" id="certamen3" name="certamen3" type="number">

            <button class="button" id="buttonAdd" type="submit">Agregar Alumno</button>
            
        </form>
    </div>
    <div id="calc" class="resultados">
        <h2>Resultados:</h2>
        <button type="submit" class="button" id="buttonCal">Calcular</button>
    </div>

</body>
</html>
